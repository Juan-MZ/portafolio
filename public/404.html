<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Portafolio - Juan José Medicis</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Redirige las rutas desconocidas al index.html conservando la URL
    var segmentCount = 1; // número de segmentos del repositorio (/portafolio = 1)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
      l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
